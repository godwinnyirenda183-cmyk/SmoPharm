name: pharmacy_pos
description: Offline-first pharmacy inventory and POS application for Zambia.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local database (SQLite ORM)
  drift: ^2.18.0
  drift_flutter: ^0.2.0

  # State management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Remote sync
  supabase_flutter: ^2.5.0

  # Receipt generation
  printing: ^5.13.1
  pdf: ^3.10.8

  # CSV export
  csv: ^6.0.0

  # Password hashing
  bcrypt: ^1.1.3

  # Connectivity detection
  connectivity_plus: ^6.0.3

  # Barcode scanning
  mobile_scanner: ^6.0.2

  # Bluetooth thermal printing (58mm / 80mm ESC/POS)
  print_bluetooth_thermal: ^1.0.9

  # UUID generation
  uuid: ^4.4.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  flutter_lints: ^3.0.0
  glados: ^1.1.7

flutter:
  uses-material-design: true
